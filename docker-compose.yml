services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: employeemanagementsystem
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"  # Map host 3307 to container 3306 (to avoid conflicts)
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./java-backend
    container_name: spring-backend
    ports:
      - "6565:6565"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/employeemanagementsystem?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build: ./employee-management-frontend
    container_name: react-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:6565
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mysql-data:

networks:
  app-network:
    driver: bridge